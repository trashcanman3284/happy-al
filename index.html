<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Happy Al</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        // Canvas setup with DPR support
        const canvas = document.getElementById('gameCanvas');
        let ctx;
        let displayWidth, displayHeight, scale;
        const BASE_HEIGHT = 600;

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            displayWidth = window.innerWidth;
            displayHeight = window.innerHeight;
            canvas.style.width = displayWidth + 'px';
            canvas.style.height = displayHeight + 'px';
            canvas.width = displayWidth * dpr;
            canvas.height = displayHeight * dpr;
            ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            scale = displayHeight / BASE_HEIGHT;
        }

        resizeCanvas();

        function s(v) { return v * scale; }

        // Asset loading
        const birdImage = new Image();
        birdImage.src = 'happyal.png';
        const columnImage = new Image();
        columnImage.src = 'column.png';
        const snowImage = new Image();
        snowImage.src = 'snow.png';
        const monkeyImage = new Image();
        monkeyImage.src = 'monkey.png';
        const backgroundImage = new Image();
        backgroundImage.src = 'background.png';
        const homepageImage = new Image();
        homepageImage.src = 'homepage.png';
        const startgamebuttonImage = new Image();
        startgamebuttonImage.src = 'startgamebutton.png';

        let assetsLoaded = 0;
        const totalAssets = 7;

        function onAssetLoad() { assetsLoaded++; }
        function onAssetError(name) { return function() { console.error('Failed to load: ' + name); assetsLoaded++; }; }

        [[birdImage, 'happyal.png'], [columnImage, 'column.png'], [snowImage, 'snow.png'],
         [monkeyImage, 'monkey.png'], [backgroundImage, 'background.png'],
         [homepageImage, 'homepage.png'], [startgamebuttonImage, 'startgamebutton.png']
        ].forEach(function(pair) { pair[0].onload = onAssetLoad; pair[0].onerror = onAssetError(pair[1]); });

        // Scaled game constants
        function columnWidth() { return s(80); }
        function columnGap() { return s(200); }
        function columnSpeed() { return s(2); }
        function powerUpSize() { return s(30); }
        function powerUpSpeed() { return s(2); }
        const SPAWN_INTERVAL = 1800;
        const POWERUP_MIN_SPAWN = 4000;
        const POWERUP_MAX_SPAWN = 12000;
        const INVULNERABILITY_DURATION = 10000;

        // Game state
        let gameState = {
            state: 'homepage',
            running: false,
            gameOver: false,
            score: 0,
            highScore: parseInt(localStorage.getItem('happyAlHighScore')) || 0,
            lastTime: 0,
            lastColumnSpawn: 0,
            lastPowerUpSpawn: 0,
            nextPowerUpSpawn: 0,
            columnRetractionLevel: 0,
            columnRetractionTimestamps: [],
            isInvulnerable: false,
            invulnerabilityStart: 0,
            invulnerabilityFlashTime: 0,
            startButtonBounce: 0
        };

        // Bird
        const bird = {
            x: 0, y: 0, width: 0, height: 0,
            velocity: 0, gravity: 0, jumpPower: 0, maxFallSpeed: 0,

            init: function() {
                this.width = s(75);
                this.height = s(56);
                this.gravity = s(0.6);
                this.jumpPower = s(-8);
                this.maxFallSpeed = s(8);
                this.x = displayWidth * 0.2;
                this.y = displayHeight / 2;
                this.velocity = 0;
            },

            update: function() {
                this.velocity += this.gravity;
                if (this.velocity > this.maxFallSpeed) this.velocity = this.maxFallSpeed;
                this.y += this.velocity;
                if (this.y + this.height > displayHeight) {
                    this.y = displayHeight - this.height;
                    this.velocity = 0;
                    triggerGameOver();
                }
                if (this.y < 0) {
                    this.y = 0;
                    this.velocity = 0;
                    triggerGameOver();
                }
            },

            jump: function() { this.velocity = this.jumpPower; },

            render: function() {
                let shouldRender = true;
                if (gameState.isInvulnerable) {
                    const elapsed = Date.now() - gameState.invulnerabilityStart;
                    const progress = elapsed / INVULNERABILITY_DURATION;
                    const flashInterval = 200 * (1 - progress * 0.8);
                    shouldRender = Math.floor(Date.now() / flashInterval) % 2 === 0;
                }
                if (!shouldRender) return;

                const rw = this.width * 1.5;
                const rh = this.height * 1.5;
                const rx = this.x - (rw - this.width) / 2;
                const ry = this.y - (rh - this.height) / 2;

                if (gameState.isInvulnerable) {
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = s(10);
                }

                if (assetsLoaded === totalAssets) {
                    ctx.drawImage(birdImage, rx, ry, rw, rh);
                } else {
                    ctx.fillStyle = gameState.isInvulnerable ? '#FFE55C' : '#FFD700';
                    ctx.fillRect(rx, ry, rw, rh);
                    ctx.strokeStyle = gameState.isInvulnerable ? '#FFA500' : '#FF8C00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(rx, ry, rw, rh);
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(this.x + this.width * 0.7, this.y + this.height * 0.3, s(4), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = gameState.isInvulnerable ? '#FFA500' : '#FF8C00';
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width, this.y + this.height * 0.4);
                    ctx.lineTo(this.x + this.width + s(10), this.y + this.height * 0.5);
                    ctx.lineTo(this.x + this.width, this.y + this.height * 0.6);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            },

            getBounds: function() {
                const pad = 0.15;
                const wr = this.width * pad;
                const hr = this.height * pad;
                return {
                    left: this.x + wr,
                    right: this.x + this.width - wr,
                    top: this.y + hr,
                    bottom: this.y + this.height - hr
                };
            }
        };

        // Columns and power-ups
        let columns = [];
        let powerUps = [];

        // Column class
        function Column(x) {
            this.x = x;
            this.width = columnWidth();
            const gap = columnGap();
            const minGapY = displayHeight * 0.2;
            const maxGapY = displayHeight * 0.7;
            this.gapY = minGapY + Math.random() * (maxGapY - minGapY);
            this.topHeight = this.gapY;
            this.bottomY = this.gapY + gap;
            this.bottomHeight = displayHeight - this.bottomY;
            this.passed = false;

            this.update = function() { this.x -= columnSpeed(); };

            this.render = function() {
                var rf = 1 - gameState.columnRetractionLevel;
                var rtH = this.topHeight * rf;
                var rbH = this.bottomHeight * rf;
                var rbY = displayHeight - rbH;

                if (assetsLoaded < totalAssets) {
                    ctx.fillStyle = '#228B22';
                    ctx.fillRect(this.x, 0, this.width, rtH);
                    ctx.fillRect(this.x, rbY, this.width, rbH);
                    ctx.strokeStyle = '#006400';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(this.x, 0, this.width, rtH);
                    ctx.strokeRect(this.x, rbY, this.width, rbH);
                } else {
                    ctx.save();
                    ctx.translate(this.x + this.width / 2, rtH);
                    ctx.scale(1, -1);
                    ctx.drawImage(columnImage, -this.width / 2, 0, this.width, rtH);
                    ctx.restore();
                    ctx.drawImage(columnImage, this.x, rbY, this.width, rbH);
                }
            };

            this.getBounds = function() {
                var pad = this.width * 0.1;
                return {
                    top: { left: this.x + pad, right: this.x + this.width - pad, top: 0, bottom: this.topHeight },
                    bottom: { left: this.x + pad, right: this.x + this.width - pad, top: this.bottomY, bottom: displayHeight }
                };
            };

            this.isOffScreen = function() { return this.x + this.width < 0; };

            this.checkCollision = function(bb) {
                var b = this.getBounds();
                if (bb.right > b.top.left && bb.left < b.top.right && bb.top < b.top.bottom) return true;
                if (bb.right > b.bottom.left && bb.left < b.bottom.right && bb.bottom > b.bottom.top) return true;
                return false;
            };

            this.checkScoring = function(birdX) {
                if (!this.passed && birdX > this.x + this.width) { this.passed = true; return true; }
                return false;
            };
        }

        // PowerUp class
        function PowerUp(x, y, type) {
            this.x = x;
            this.y = y;
            this.width = powerUpSize();
            this.height = powerUpSize();
            this.type = type;
            this.collected = false;

            this.update = function() { this.x -= powerUpSpeed(); };

            this.render = function() {
                var rw = this.width * 1.5;
                var rh = this.height * 1.5;
                var rx = this.x - (rw - this.width) / 2;
                var ry = this.y - (rh - this.height) / 2;

                if (assetsLoaded === totalAssets) {
                    ctx.drawImage(this.type === 'snow' ? snowImage : monkeyImage, rx, ry, rw, rh);
                } else {
                    var colors = this.type === 'snow' ? ['#E0E0E0', '#FFF'] : ['#8B4513', '#DEB887'];
                    ctx.fillStyle = colors[0];
                    ctx.fillRect(rx, ry, rw, rh);
                    var m = s(7.5);
                    ctx.fillStyle = colors[1];
                    ctx.fillRect(rx + m, ry + m, rw - 2 * m, rh - 2 * m);
                }
            };

            this.getBounds = function() {
                return { left: this.x, right: this.x + this.width, top: this.y, bottom: this.y + this.height };
            };

            this.isOffScreen = function() { return this.x + this.width < 0; };

            this.checkCollision = function(bb) {
                var b = this.getBounds();
                return bb.right > b.left && bb.left < b.right && bb.bottom > b.top && bb.top < b.bottom;
            };
        }

        // Spawning
        function getNextPowerUpSpawnTime() {
            return POWERUP_MIN_SPAWN + Math.random() * (POWERUP_MAX_SPAWN - POWERUP_MIN_SPAWN);
        }

        function spawnColumn() { columns.push(new Column(displayWidth)); }

        function spawnPowerUp() {
            var type = Math.random() < 0.75 ? 'snow' : 'monkey';
            var y;
            if (type === 'snow') {
                y = displayHeight * 0.2 + Math.random() * displayHeight * 0.6;
            } else {
                var margin = s(50);
                y = margin + Math.random() * (displayHeight - powerUpSize() - 2 * margin);
            }
            powerUps.push(new PowerUp(displayWidth, y, type));
            gameState.nextPowerUpSpawn = getNextPowerUpSpawnTime();
            gameState.lastPowerUpSpawn = Date.now();
        }

        // Power-up effects
        function collectPowerUp(pu) {
            if (pu.type === 'snow') {
                gameState.columnRetractionLevel = Math.min(gameState.columnRetractionLevel + 0.025, 0.1);
                gameState.columnRetractionTimestamps.push(Date.now());
            } else if (pu.type === 'monkey') {
                gameState.isInvulnerable = true;
                gameState.invulnerabilityStart = Date.now();
                gameState.invulnerabilityFlashTime = 0;
            }
        }

        function updateColumnRetractionEffects() {
            var now = Date.now();
            gameState.columnRetractionTimestamps = gameState.columnRetractionTimestamps.filter(
                function(t) { return now - t < 15000; }
            );
            gameState.columnRetractionLevel = Math.min(gameState.columnRetractionTimestamps.length * 0.025, 0.1);
        }

        // Update game objects
        function updateGame() {
            var now = Date.now();

            if (now - gameState.lastColumnSpawn > SPAWN_INTERVAL) {
                spawnColumn();
                gameState.lastColumnSpawn = now;
            }
            if (now - gameState.lastPowerUpSpawn > gameState.nextPowerUpSpawn) {
                spawnPowerUp();
            }

            var bb = bird.getBounds();

            for (var i = columns.length - 1; i >= 0; i--) {
                var col = columns[i];
                col.update();
                if (col.checkScoring(bird.x)) {
                    gameState.score++;
                    if (gameState.score > gameState.highScore) {
                        gameState.highScore = gameState.score;
                        localStorage.setItem('happyAlHighScore', String(gameState.highScore));
                    }
                }
                if (!gameState.isInvulnerable && col.checkCollision(bb)) triggerGameOver();
                if (col.isOffScreen()) columns.splice(i, 1);
            }

            for (var i = powerUps.length - 1; i >= 0; i--) {
                var pu = powerUps[i];
                pu.update();
                if (!pu.collected && pu.checkCollision(bb)) {
                    collectPowerUp(pu);
                    powerUps.splice(i, 1);
                } else if (pu.isOffScreen()) {
                    powerUps.splice(i, 1);
                }
            }

            if (gameState.isInvulnerable && now - gameState.invulnerabilityStart >= INVULNERABILITY_DURATION) {
                gameState.isInvulnerable = false;
            }
        }

        // Input handling
        var fullscreenRequested = false;
        var isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        function handleInput() {
            if (!fullscreenRequested) {
                fullscreenRequested = true;
                var el = document.documentElement;
                var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (rfs) rfs.call(el).catch(function() {});
            }

            if (gameState.state === 'homepage') startGame();
            else if (gameState.gameOver) restartGame();
            else if (gameState.running) bird.jump();
            else startGame();
        }

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') { e.preventDefault(); handleInput(); }
        });

        canvas.addEventListener('click', handleInput);

        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleInput();
        }, { passive: false });

        // Prevent double-tap zoom on mobile
        var lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            var now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });

        // Game state functions
        function triggerGameOver() {
            if (gameState.gameOver) return;
            gameState.state = 'gameOver';
            gameState.running = false;
            gameState.gameOver = true;
        }

        function startGame() {
            gameState.state = 'playing';
            gameState.running = true;
            gameState.gameOver = false;
            gameState.score = 0;
            gameState.lastColumnSpawn = Date.now();
            gameState.lastPowerUpSpawn = Date.now();
            gameState.nextPowerUpSpawn = getNextPowerUpSpawnTime();
            gameState.columnRetractionLevel = 0;
            gameState.columnRetractionTimestamps = [];
            gameState.isInvulnerable = false;
            gameState.invulnerabilityStart = 0;
            gameState.invulnerabilityFlashTime = 0;
            bird.init();
            columns = [];
            powerUps = [];
            bgScrollX = 0;
            memoryMonitor.init();
        }

        function restartGame() {
            gameState.state = 'homepage';
            gameState.gameOver = false;
            gameState.running = false;
        }

        // Rendering
        var bgScrollX = 0;

        function renderBackground() {
            if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                if (gameState.running && !gameState.gameOver) bgScrollX -= s(0.5);
                var drawH = displayHeight;
                var drawW = drawH * (backgroundImage.naturalWidth / backgroundImage.naturalHeight);
                var offset = ((bgScrollX % drawW) + drawW) % drawW;
                for (var x = -offset; x < displayWidth + drawW; x += drawW) {
                    ctx.drawImage(backgroundImage, x, 0, drawW, drawH);
                }
            } else {
                var g = ctx.createLinearGradient(0, 0, 0, displayHeight);
                g.addColorStop(0, '#87CEEB');
                g.addColorStop(0.5, '#E0F6FF');
                g.addColorStop(1, '#98FB98');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, displayWidth, displayHeight);
            }
        }

        function renderClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            drawCloud(displayWidth * 0.19, displayHeight * 0.17, scale);
            drawCloud(displayWidth * 0.63, displayHeight * 0.25, scale * 0.8);
            drawCloud(displayWidth * 0.81, displayHeight * 0.13, scale * 1.2);
        }

        function drawCloud(x, y, sc) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(sc, sc);
            ctx.beginPath();
            ctx.arc(0, 0, 20, 0, Math.PI * 2);
            ctx.arc(25, 0, 25, 0, Math.PI * 2);
            ctx.arc(50, 0, 20, 0, Math.PI * 2);
            ctx.arc(15, -15, 18, 0, Math.PI * 2);
            ctx.arc(35, -15, 22, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function renderScore() {
            var pad = s(10);
            var boxW = s(150);
            var boxH = s(50);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
            ctx.beginPath();
            ctx.roundRect(pad, pad, boxW, boxH, s(8));
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold ' + s(20) + 'px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Score: ' + gameState.score, pad + s(10), pad + s(22));
            ctx.font = s(14) + 'px Arial';
            ctx.fillText('Best: ' + gameState.highScore, pad + s(10), pad + s(42));
        }

        function renderHomepage() {
            if (homepageImage.complete) {
                ctx.drawImage(homepageImage, 0, 0, displayWidth, displayHeight);
            } else {
                renderBackground();
            }

            gameState.startButtonBounce += 0.1;
            var bw = s(200);
            var bh = s(80);
            var bx = displayWidth / 2 - bw / 2;
            var bounce = Math.sin(gameState.startButtonBounce) * s(10);
            var by = displayHeight / 2 + s(50) + bounce;

            if (startgamebuttonImage.complete) {
                ctx.drawImage(startgamebuttonImage, bx, by, bw, bh);
            } else {
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.roundRect(bx, by, bw, bh, s(8));
                ctx.fill();
                ctx.strokeStyle = '#45a049';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold ' + s(24) + 'px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('START GAME', displayWidth / 2, by + bh * 0.6);
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.font = s(18) + 'px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(isMobile ? 'Tap to play!' : 'Press SPACE or click to play!', displayWidth / 2, displayHeight - s(40));
            ctx.textAlign = 'left';
        }

        function renderGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, displayWidth, displayHeight);

            ctx.textAlign = 'center';
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold ' + s(48) + 'px Arial';
            ctx.fillText('Game Over!', displayWidth / 2, displayHeight / 2 - s(60));

            ctx.font = s(24) + 'px Arial';
            ctx.fillText('Score: ' + gameState.score, displayWidth / 2, displayHeight / 2 - s(15));

            if (gameState.score > 0 && gameState.score === gameState.highScore) {
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold ' + s(28) + 'px Arial';
                ctx.fillText('NEW HIGH SCORE!', displayWidth / 2, displayHeight / 2 + s(25));
            } else {
                ctx.fillText('High Score: ' + gameState.highScore, displayWidth / 2, displayHeight / 2 + s(25));
            }

            ctx.fillStyle = '#FFF';
            ctx.font = s(20) + 'px Arial';
            ctx.fillText(isMobile ? 'Tap to restart' : 'Press SPACE or click to restart', displayWidth / 2, displayHeight / 2 + s(75));
            ctx.textAlign = 'left';
        }

        function renderGame() {
            ctx.clearRect(0, 0, displayWidth, displayHeight);

            if (gameState.state === 'homepage') { renderHomepage(); return; }

            renderBackground();
            renderClouds();
            columns.forEach(function(c) { c.render(); });
            powerUps.forEach(function(p) { p.render(); });
            bird.render();
            renderScore();

            if (gameState.gameOver) renderGameOver();
        }

        // Memory monitor (stripped to essentials)
        var memoryMonitor = {
            gameStartTime: 0,
            lastRefresh: 0,
            lastCheck: 0,

            init: function() {
                this.gameStartTime = Date.now();
                this.lastRefresh = Date.now();
                this.lastCheck = Date.now();
            },

            check: function() {
                var now = Date.now();
                if (now - this.lastCheck < 5000) return;
                this.lastCheck = now;
                if (now - this.gameStartTime < 25 * 60 * 1000) return;
                if (!performance.memory) return;

                var used = performance.memory.usedJSHeapSize;
                if (used > 100 * 1024 * 1024 ||
                    (used > 50 * 1024 * 1024 && now - this.lastRefresh > 10 * 60 * 1000)) {
                    this.refresh();
                }
            },

            refresh: function() {
                var dpr = window.devicePixelRatio || 1;
                ctx = canvas.getContext('2d');
                ctx.scale(dpr, dpr);
                this.lastRefresh = Date.now();
            }
        };

        // Game loop
        function gameLoop(currentTime) {
            gameState.lastTime = currentTime;

            if (gameState.running && !gameState.gameOver) {
                bird.update();
                updateGame();
                updateColumnRetractionEffects();
                memoryMonitor.check();
            }

            renderGame();
            requestAnimationFrame(gameLoop);
        }

        // Resize handler
        window.addEventListener('resize', function() {
            var oldW = displayWidth;
            var oldH = displayHeight;
            var oldScale = scale;
            resizeCanvas();
            if (!oldW || !oldH) return;

            var xRatio = displayWidth / oldW;
            var yRatio = displayHeight / oldH;
            var sRatio = scale / oldScale;

            bird.x *= xRatio;
            bird.y *= yRatio;
            bird.velocity *= sRatio;
            bird.width = s(75);
            bird.height = s(56);
            bird.gravity = s(0.6);
            bird.jumpPower = s(-8);
            bird.maxFallSpeed = s(8);

            columns.forEach(function(col) {
                col.x *= xRatio;
                col.width = columnWidth();
                col.gapY *= yRatio;
                col.topHeight = col.gapY;
                col.bottomY *= yRatio;
                col.bottomHeight = displayHeight - col.bottomY;
            });

            powerUps.forEach(function(pu) {
                pu.x *= xRatio;
                pu.y *= yRatio;
                pu.width = powerUpSize();
                pu.height = powerUpSize();
            });
        });

        window.addEventListener('focus', function() { gameState.lastTime = performance.now(); });
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) gameState.lastTime = performance.now();
        });

        // Init
        function initGame() {
            memoryMonitor.init();
            bird.init();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('load', initGame);
    </script>
</body>
</html>
